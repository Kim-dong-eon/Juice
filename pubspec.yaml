name: juice
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.2.0
  collection: ^1.15.0
  image_picker: ^0.8.4+3
  tflite: ^1.1.2
  charts_flutter: ^0.12.0
  cupertino_icons: ^1.0.6
  flutter_vision: ^1.1.4
  dropdown_button2: ^2.3.9
  shared_preferences: 2.2.3
  percent_indicator: 4.2.3
  kakao_flutter_sdk_common: ^1.9.5
  kakao_flutter_sdk_user: ^1.4.3
  kakao_flutter_sdk_talk: ^1.0.0
  google_sign_in: ^5.0.7
  firebase_auth: ^5.2.0
  firebase_core: ^3.0.0
  syncfusion_flutter_gauges: ^20.2.48
  flutter_tts: ^3.8.0
  #charts_flutter: ^0.12.0
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 폰트 설정 추가
  fonts:
    - family: 온글잎 누카
      fonts:
        - asset: assets/온글잎 누카.ttf

  # 앱에 사용할 에셋 파일 추가
  assets:
    - assets/best_float32.tflite
    - assets/labels1.txt
    - assets/juice3.png
    - assets/juice2.png
    - assets/kakao.png
    - assets/google.png
    - assets/facebook.png
    - assets/naver.png
    - assets/korea_regions.json